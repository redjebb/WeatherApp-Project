<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Основни настройки на страницата -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Заглавие на страницата -->
    <title>Weather App</title>

    <!-- Font Awesome библиотека за иконите -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Външен CSS файл -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Основен контейнер на приложението -->
    <div class="weather-container">

        <!-- Поле за търсене и бутони -->
        <form id="search-form" class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">

            <button type="submit" id="search-btn">
                Search
            </button>

            <button type="button" id="unit-toggle" class="toggle-btn">
                °F
            </button>
        </form>

        <div id="history-container" class="history-list"></div>

        <button type="button" id="clear-history-btn" class="clear-history-btn hidden">
    Clear History
</button>

        <!-- Съобщение при грешка -->
        <p id="error-message" class="hidden">
            City not found. Please try again.
        </p>

        <!-- Съобщение при зареждане -->
        <p id="loading-spinner" class="hidden">
            <i class="fa-solid fa-spinner fa-spin"></i> Fetching local conditions...
        </p>

        <!-- Основна секция с информация за времето -->
        <main id="weather-info" class="weather-info">

            <div class="main-info">

                <h1 id="location">--</h1>

                <div class="temp-container">
                    <span id="temperature">--</span>
                    <span class="unit" id="unit-display">°C</span>
                </div>

                <div id="weather-icon" class="weather-icon-main"></div>

                <p id="description">Search for a city</p>

            </div>

            <div class="details-grid">

                <div class="detail-card">
                    <span class="label">Humidity</span>
                    <span id="humidity">--</span>
                </div>

                <div class="detail-card">
                    <span class="label">Wind</span>
                    <span id="wind-speed">--</span>
                </div>

                <div class="detail-card">
                    <span class="label">UV Index</span>
                    <span id="uv-index">--</span>
                </div>

                <div class="detail-card">
    <span class="label">Sunrise</span>
    <span id="sunrise">--</span>
</div>

<div class="detail-card">
    <span class="label">Sunset</span>
    <span id="sunset">--</span>
</div>

                <div class="detail-card tooltip-card">
    <span class="label">Air Quality</span>
    <span id="air-quality">--</span>
    <span id="air-quality-tooltip" class="tooltip-text">
        Air quality shows how polluted the air is. Lower values mean cleaner air.
    </span>
</div>

            </div>

        </main>

        <div class="forecast-layout">
            <section class="forecast-section">
                <h2>Hourly Forecast</h2>
                <section id="hourly-container" class="hourly-grid hidden"></section>
            </section>

            <section class="forecast-section">
                <h2>5-Day Forecast</h2>
                <section id="forecast-container" class="forecast-grid hidden"></section>
            </section>
        </div>

        <script type="module" src="app.js"></script>

</body>

</html>
